 <script src="https://cdn.apollo.rio.br/v1.0.0/cdn.js" fetchpriority="high"></script>
  <script src="https://cdn.apollo.rio.br/v1.0.0/js/jquery.v4.min.js"></script>
  <style>
       :root {

      /* Extras dyue injected ROOT stylesheet via CDN APOLLO */
      --radius: 0px; /* Sharp corners for ultra-modern look */
      --space-4: 24px;
      
      /* Animation */
      --ease-lux: cubic-bezier(0.16, 1, 0.3, 1);
      --z-modal: 9999;
    }

  
    /* ========================================= */
    /* 3. THE LUXURY FORM MODAL                  */
    /* ========================================= */
    
    /* Overlay Backdrop */
    .form-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(15px); /* Heavy Luxury Blur */
      -webkit-backdrop-filter: blur(15px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s var(--ease-lux);
      z-index: var(--z-modal);
    }

    .apollo-open .form-overlay {
      opacity: 1;
      visibility: visible;
    }

    /* The Modal Itself */
    .apollo-modal {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: var(--white-1);
      border-left: 1px solid var(--border);
      padding: 60px 40px;
      box-sizing: border-box;
      
      transform: translateX(100%);
      transition: transform 0.6s var(--ease-lux);
      z-index: calc(var(--z-modal) + 1);
      display: flex;
      flex-direction: column;
    }

    .apollo-open .apollo-modal {
      transform: translateX(0);
    }

    /* Close Button */
    .modal-close {
      position: absolute;
      top: 30px;
      right: 30px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.3s;
    }
    .modal-close:hover { color: var(--primary); }

    /* Header */
    .modal-header h2 {
      font-family: var(--ff-mono);
      font-size: 12px;
      color: var(--primary);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .modal-header h1 {
      font-size: 32px;
      font-weight: 300;
      color: var(--black-1);
      margin: 0 0 40px 0;
      line-height: 1.1;
    }

    /* ========================================= */
    /* 4. INPUTS & SELECT (MINIMALIST)           */
    /* ========================================= */
    .input-group {
      position: relative;
      margin-bottom: 35px;
    }

    /* Base Input Style */
    .apollo-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      font-family: var(--ff-main);
      font-size: 16px;
      color: var(--black-1);
      border-radius: 0;
      outline: none;
      transition: border-color 0.4s var(--ease-lux);
    }

    .apollo-input:focus {
      border-bottom-color: var(--primary);
    }

    /* Floating Labels */
    .apollo-label {
      position: absolute;
      top: 12px;
      left: 0;
      font-family: var(--ff-mono);
      font-size: 12px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.4s var(--ease-lux);
      text-transform: uppercase;
    }

    /* Label Animation State */
    .apollo-input:focus ~ .apollo-label,
    .apollo-input:not(:placeholder-shown) ~ .apollo-label {
      top: -10px;
      font-size: 10px;
      color: var(--primary);
    }

    /* ========================================= */
    /* 5. CUSTOM DROPDOWN (Squircle, No Border)   */
    /* ========================================= */

    /* Container */
    .dropdown {
      position: relative;
      padding: 0;
      margin: 0;
      width: 100%;
    }

    /* Header */
    .dropdown h4 {
      position: relative;
      display: flex;
      align-items: center;
      padding: 12px 15px;
      margin: 0;
      background: var(--surface, rgba(0,0,0,0.04));
      color: var(--txt-color, #1a1a1a);
      font-family: var(--ff-main);
      font-size: var(--fs-p);
      font-weight: 500;
      text-align: left;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: border-radius 0.3s ease, background 0.2s ease;
      backdrop-filter: blur(10px) saturate(200%);
      -webkit-backdrop-filter: blur(10px) saturate(200%);
    }

    /* Animated bottom accent line */
    .dropdown h4::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .dropdown:hover h4::after {
      opacity: 1;
      animation: borderPulse 5.5s infinite ease-in-out;
    }

    /* Colored indicator dot */
    .dropdown h4::before {
      content: '';
      display: inline-block;
      margin-right: 12px;
      background: var(--primary);
      border-radius: 4px;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      transition: background-color 0.3s ease;
    }

    /* Arrow icon */
    .dropdown .dropdown-arrow {
      margin-left: auto;
      font-size: 16px;
      color: var(--txt-muted);
      transition: transform 0.3s ease;
    }
    .dropdown:hover .dropdown-arrow {
      transform: rotate(180deg);
    }

    /* Dot color per selection */
    .dropdown h4.selected-1::before { background: #5790E6; }
    .dropdown h4.selected-2::before { background: #8773EB; }
    .dropdown h4.selected-3::before { background: #B27CD9; }
    .dropdown h4.selected-4::before { background: #E884B0; }

    /* Floating label for dropdown */
    .dropdown-label {
      position: absolute;
      top: -8px;
      left: 12px;
      font-family: var(--ff-mono);
      font-size: 10px;
      color: var(--primary);
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2;
    }
    .dropdown.has-selection .dropdown-label {
      opacity: 1;
    }

    /* The options list */
    .dropdown ul {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      display: block;
      list-style: none;
      padding: 0;
      margin: 0;
      background: var(--white-1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border: none;
      border-radius: 0 0 10px 10px;
      z-index: 10;
      overflow: hidden;
    }

    .dropdown li {
      display: flex;
      align-items: center;
      padding: 0 15px;
      background: var(--white-1);
      color: var(--txt-muted);
      font-family: var(--ff-main);
      font-size: var(--fs-p);
      text-align: left;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      border: none;
      cursor: pointer;
      transition: max-height 0.4s ease, opacity 0.3s ease, background-color 0.2s ease, padding 0.3s ease;
    }

    .dropdown li b {
      color: var(--txt-color);
      font-weight: 500;
      margin-right: 4px;
    }

    /* List item dots */
    .dropdown li::before {
      content: '';
      display: inline-block;
      margin-right: 12px;
      border-radius: 4px;
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    /* Hover to reveal */
    .dropdown:hover h4 {
      border-radius: 10px 10px 0 0;
    }

    .dropdown:hover li {
      padding: 11px 15px;
      max-height: 60px;
      opacity: 1;
    }

    .dropdown li:hover,
    .dropdown li.selected {
      background-color: var(--surface-hover, rgba(0,0,0,0.06));
      color: var(--txt-color);
    }

    /* Dot colors + staggered delays */
    .dropdown li:nth-child(1) { transition-delay: 0s; }
    .dropdown li:nth-child(1)::before { background: #5790E6; }
    .dropdown li:nth-child(2) { transition-delay: 0.04s; }
    .dropdown li:nth-child(2)::before { background: #8773EB; }
    .dropdown li:nth-child(3) { transition-delay: 0.08s; }
    .dropdown li:nth-child(3)::before { background: #B27CD9; }
    .dropdown li:nth-child(4) { transition-delay: 0.12s; }
    .dropdown li:nth-child(4)::before { background: #E884B0; }

    /* Separator between items */
    .dropdown:hover li + li {
      border-top: 1px solid var(--surface, rgba(0,0,0,0.04));
    }

    @keyframes borderPulse {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 1; }
    }

    /* ========================================= */
    /* 6. SUBMIT ACTION                          */
    /* ========================================= */
    .submit-btn {
      margin-top: auto; 
      background: transparent;
      border: 1px solid var(--border);
      color: var(--black-1);
      padding: 20px;
      font-family: var(--ff-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: var(--black-1);
      color: var(--white-1);
      border-color: var(--black-1);
    }

    /* ========================================= */
    /* 7. SUCCESS STATE                          */
    /* ========================================= */
    .success-view {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--white-1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .form-submitted .success-view {
      opacity: 1;
      pointer-events: all;
    }

    .success-icon {
      font-size: 4rem;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .success-view h3 {
      font-size: 24px;
      margin: 0;
      font-weight: 400;
    }
    .success-view p {
      color: var(--text-muted);
      font-family: var(--ff-mono);
      font-size: 12px;
      margin-top: 10px;
    }

  </style>
</head>
<body>


 
<span id="add-eventTrigger">
Add Event TRIGGER  </span>




  <div class="form-overlay" id="apolloOverlay"></div>
  <div class="apollo-modal" id="apolloModal">
    <button class="modal-close" id="apolloClose">
      <i class="ri-close-line"></i>
    </button>
    <div class="modal-header">
      <h2>Contato</h2>
      <h1>Como podemos<br>ajudar você?</h1>
    </div>

    <div class="success-view">
      <i class="ri-checkbox-circle-line success-icon"></i>
      <h3>Mensagem Enviada</h3>
      <p>Nossa equipe entrará em contato em breve.</p>
    </div>

    <form id="apolloForm" autocomplete="off">
      
      <div class="input-group">
        <input type="text" class="apollo-input" placeholder=" " required>
        <label class="apollo-label">Nome Completo</label>
      </div>

      <div class="input-group">
        <input type="email" class="apollo-input" placeholder=" " required>
        <label class="apollo-label">E-mail Corporativo</label>
      </div>

      <div class="input-group">
        <!-- Hidden native select for form data -->
        <input type="hidden" name="assunto" id="assuntoValue" required>
        
        <div class="dropdown" id="assuntoDropdown">
          <span class="dropdown-label">Assunto</span>
          <h4>Assunto <i class="ri-arrow-down-s-line dropdown-arrow"></i></h4>
          <ul>
            <li data-value="1"><b>Parceria</b> sobre colaboração</li>
            <li data-value="2"><b>Problema</b> ou denúncia</li>
            <li data-value="3"><b>Suporte</b> técnico</li>
            <li data-value="4"><b>Feedback</b> elogio ou crítica</li>
          </ul>
        </div>
      </div>

      <div class="input-group">
        <input type="text" class="apollo-input" placeholder=" " required>
        <label class="apollo-label">Mensagem</label>
      </div>

      <button type="submit" class="submit-btn">
        <span>Enviar Agora</span>
        <i class="ri-send-plane-fill"></i>
      </button>

    </form>
  </div>

  <script>
    // Modern jQuery 4.0 Syntax: $(function() {}) instead of $(document).ready()
    $(function() {
      const body = $('body');
      const trigger = $('#add-eventTrigger');
      const closeBtn = $('#apolloClose');
      const overlay = $('#apolloOverlay');
      const form = $('#apolloForm');
      const modal = $('#apolloModal');

      // OPEN
      trigger.on('click', function() {
        body.addClass('apollo-open');
        $(this).css({ opacity: 0, pointerEvents: 'none' });
      });

      // CLOSE
      function closeForm() {
        body.removeClass('apollo-open');
        trigger.css({ opacity: 1, pointerEvents: 'all' });
        
        setTimeout(function() {
          modal.removeClass('form-submitted');
          form[0].reset();
        }, 600); // Matches CSS transition duration
      }

      closeBtn.on('click', closeForm);
      overlay.on('click', closeForm);

      // CUSTOM DROPDOWN
      $('#assuntoDropdown ul li').on('click', function() {
        const $dd = $(this).closest('.dropdown');
        $dd.find('li').removeClass('selected');
        $(this).addClass('selected');
        
        const idx = $(this).index() + 1;
        const label = $(this).find('b').text();
        $dd.find('h4')
          .html(label + ' <i class="ri-arrow-down-s-line dropdown-arrow"></i>')
          .removeClass()
          .addClass('selected-' + idx);
        
        $dd.addClass('has-selection');
        $('#assuntoValue').val($(this).data('value'));
      });

      // SUBMIT SIMULATION
      form.on('submit', function(e) {
        e.preventDefault();
        
        // Visual Success State
        modal.addClass('form-submitted');
        
        // Auto close after 2.5s
        setTimeout(closeForm, 2500);
      });
    });
  </script>

</body>
</html>
